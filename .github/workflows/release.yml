name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal macOS build (Apple Silicon + Intel in one bundle).
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          # Linux (.deb + .AppImage + .rpm).
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            curl wget file \
            libssl-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Forklift GUI ${{ github.ref_name }}"
          releaseBody: |
            Desktop GUI for the [forklift](https://github.com/lonic-software/forklift) VCS.

            **Downloads**
            - macOS: the `.dmg` (universal — Apple Silicon & Intel). Unsigned, so on first launch: right-click → Open.
            - Linux: the `.AppImage` (portable) or `.deb` (Debian/Ubuntu).

            Requires a `forklift` binary on your system (the app auto-detects it, or set the path in Settings → Binary).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
